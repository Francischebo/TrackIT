[pytest]
# ignore non-python files that appear in repo root and tmp folders
python_files = test_*.py tests/*.py
norecursedirs = .venv venv env frontend node_modules tmp backend/scratch backend/scratch_
# ignore specific data files that caused collection errors
addopts = --ignore=backend/test_debug.py --ignore=backend/test_http.py --ignore=backend/test_integration.py
testpaths = backend
